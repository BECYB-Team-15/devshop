name: Faza 1 - Niezabezpieczony Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted # Uruchamia się na Twoim lokalnym komputerze

    steps:
      - name: Pobranie kodu repozytorium
        uses: actions/checkout@v4

      - name: Logowanie do GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Zbudowanie i wypchnięcie obrazu - Backend
        run: |
          # Zamień 'wasza-organizacja' na nazwę swojego konta lub organizacji na GitHubie (małymi literami!)
          docker build -t ghcr.io/becyb-team-15/devshop-backend:${{ github.sha }} ./devshop-backend
          docker push ghcr.io/becyb-team-15/devshop-backend:${{ github.sha }}

      - name: Zbudowanie i wypchnięcie obrazu - Frontend
        run: |
          docker build -t ghcr.io/becyb-team-15/devshop-frontend:${{ github.sha }} ./devshop-frontend
          docker push ghcr.io/becyb-team-15/devshop-frontend:${{ github.sha }}

      - name: Wdrożenie na lokalny klaster Kubernetes
        run: |
          # Dynamiczna zamiana tagu 'latest' z plików na aktualny hash commita,
          # żeby upewnić się, że k8s zaciągnie nową wersję, a nie użyje cache'u
          sed -i "s|image: ghcr.io/becyb-team-15/devshop-backend:latest|image: ghcr.io/becyb-team-15/devshop-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|image: ghcr.io/becyb-team-15/devshop-frontend:latest|image: ghcr.io/becyb-team-15/devshop-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml

          # Aplikowanie wszystkich manifestów po kolei
          kubectl apply -f k8s/01-namespace.yaml
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml